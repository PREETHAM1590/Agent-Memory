version: '3.8'

services:
  agent-memory:
    build: .
    ports:
      - "37800:37800"
    volumes:
      - agent-memory-data:/data
    environment:
      - AGENT_MEMORY_DB=/data/memory.db
      - PORT=37800
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/data

volumes:
  agent-memory-data:
  chromadb-data:
