<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent-Memory Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .memory-card { transition: all 0.2s; }
    .memory-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .type-bugfix { border-left: 4px solid #ef4444; }
    .type-feature { border-left: 4px solid #22c55e; }
    .type-decision { border-left: 4px solid #a855f7; }
    .type-discovery { border-left: 4px solid #3b82f6; }
    .type-change { border-left: 4px solid #eab308; }
    .type-pattern { border-left: 4px solid #f97316; }
    .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold">M</span>
        </div>
        <span class="font-semibold text-gray-800">Agent-Memory</span>
      </div>
      <div class="flex items-center space-x-4">
        <button onclick="openSearch()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">
          Search
        </button>
        <button onclick="syncCloud()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
          Sync
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="text-2xl font-bold text-gray-800" id="stat-observations">0</div>
        <div class="text-sm text-gray-500">Observations</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="text-2xl font-bold text-gray-800" id="stat-sessions">0</div>
        <div class="text-sm text-gray-500">Sessions</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="text-2xl font-bold text-gray-800" id="stat-patterns">0</div>
        <div class="text-sm text-gray-500">Patterns</div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="text-2xl font-bold text-gray-800" id="stat-projects">0</div>
        <div class="text-sm text-gray-500">Projects</div>
      </div>
    </div>

    <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
      <div class="flex space-x-6 border-b mb-4">
        <button class="tab-active pb-2 font-medium" onclick="showTab('stream')">Stream</button>
        <button class="pb-2 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('analytics')">Analytics</button>
        <button class="pb-2 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('patterns')">Patterns</button>
        <button class="pb-2 font-medium text-gray-500 hover:text-gray-700" onclick="showTab('settings')">Settings</button>
      </div>

      <div id="tab-stream">
        <div class="flex justify-between items-center mb-4">
          <select id="type-filter" class="border rounded-lg px-3 py-2" onchange="loadObservations()">
            <option value="">All Types</option>
            <option value="bugfix">Bugfix</option>
            <option value="feature">Feature</option>
            <option value="decision">Decision</option>
            <option value="discovery">Discovery</option>
            <option value="change">Change</option>
          </select>
          <input type="text" id="search-input" placeholder="Search observations..." class="border rounded-lg px-4 py-2 w-64" onkeypress="if(event.key==='Enter')search()">
        </div>
        <div id="observations-list" class="space-y-3"></div>
      </div>

      <div id="tab-analytics" class="hidden">
        <div class="grid grid-cols-2 gap-6">
          <div>
            <h3 class="font-semibold mb-3">Observation Types</h3>
            <canvas id="typeChart" height="200"></canvas>
          </div>
          <div>
            <h3 class="font-semibold mb-3">Activity Over Time</h3>
            <canvas id="activityChart" height="200"></canvas>
          </div>
        </div>
      </div>

      <div id="tab-patterns" class="hidden">
        <div id="patterns-list" class="space-y-3"></div>
      </div>

      <div id="tab-settings" class="hidden">
        <div class="max-w-lg">
          <h3 class="font-semibold mb-4">Configuration</h3>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Cloud Sync</label>
              <select class="border rounded-lg px-3 py-2 w-full">
                <option>Disabled</option>
                <option>Supabase</option>
                <option>Firebase</option>
                <option>Custom</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Summarization Level</label>
              <select class="border rounded-lg px-3 py-2 w-full">
                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
              </select>
            </div>
            <div class="flex items-center">
              <input type="checkbox" id="learning-enabled" checked class="mr-2">
              <label for="learning-enabled" class="text-sm text-gray-700">Enable Pattern Learning</label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="search-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-2xl">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold">Search Memory</h2>
        <button onclick="closeSearch()" class="text-gray-500 hover:text-gray-700">&times;</button>
      </div>
      <input type="text" id="modal-search" class="border rounded-lg px-4 py-2 w-full mb-4" placeholder="Enter search query..." onkeypress="if(event.key==='Enter')modalSearch()">
      <div id="search-results" class="max-h-96 overflow-y-auto"></div>
    </div>
  </div>

  <div id="observation-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-3xl max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold" id="modal-title"></h2>
        <button onclick="closeObservation()" class="text-gray-500 hover:text-gray-700">&times;</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    let ws;
    let typeChart, activityChart;

    async function init() {
      await loadStats();
      await loadObservations();
      initWebSocket();
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        document.getElementById('stat-observations').textContent = stats.totalObservations;
        document.getElementById('stat-sessions').textContent = stats.totalSessions;
        document.getElementById('stat-patterns').textContent = stats.patterns || 0;
        document.getElementById('stat-projects').textContent = stats.totalProjects;

        if (stats.typeBreakdown) {
          updateCharts(stats.typeBreakdown);
        }
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    async function loadObservations() {
      try {
        const type = document.getElementById('type-filter').value;
        const url = type ? `/api/observations?type=${type}&limit=50` : '/api/observations?limit=50';
        const res = await fetch(url);
        const observations = await res.json();
        renderObservations(observations);
      } catch (e) {
        console.error('Failed to load observations:', e);
      }
    }

    function renderObservations(observations) {
      const list = document.getElementById('observations-list');
      list.innerHTML = observations.map(obs => {
        const icons = { bugfix: '🔴', feature: '🟢', decision: '🟣', discovery: '🔵', change: '🟡', pattern: '🟠', note: '📝' };
        const icon = icons[obs.type] || '⚪';
        const date = new Date(obs.createdAt).toLocaleDateString();
        return `
          <div class="memory-card bg-gray-50 rounded-lg p-4 type-${obs.type} cursor-pointer" onclick="showObservation(${obs.id})">
            <div class="flex justify-between items-start">
              <div>
                <span class="text-lg">${icon}</span>
                <span class="font-medium ml-2">${obs.title}</span>
              </div>
              <span class="text-sm text-gray-500">${date}</span>
            </div>
            <p class="text-gray-600 mt-2 text-sm line-clamp-2">${obs.content.slice(0, 150)}...</p>
            <div class="flex gap-2 mt-2">
              ${obs.tags.map(t => `<span class="text-xs bg-gray-200 px-2 py-1 rounded">${t}</span>`).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    async function showObservation(id) {
      try {
        const res = await fetch(`/api/observations/${id}`);
        const obs = await res.json();
        document.getElementById('modal-title').textContent = `#${obs.id} - ${obs.title}`;
        document.getElementById('modal-content').innerHTML = `
          <div class="space-y-4">
            <div>
              <span class="text-sm font-medium text-gray-500">Type</span>
              <p class="mt-1">${obs.type}</p>
            </div>
            <div>
              <span class="text-sm font-medium text-gray-500">Date</span>
              <p class="mt-1">${new Date(obs.createdAt).toLocaleString()}</p>
            </div>
            <div>
              <span class="text-sm font-medium text-gray-500">Content</span>
              <div class="mt-1 bg-gray-50 rounded-lg p-4 whitespace-pre-wrap">${obs.content}</div>
            </div>
            ${obs.filesRead?.length ? `<div><span class="text-sm font-medium text-gray-500">Files Read</span><p class="mt-1 text-sm">${obs.filesRead.join(', ')}</p></div>` : ''}
            ${obs.filesModified?.length ? `<div><span class="text-sm font-medium text-gray-500">Files Modified</span><p class="mt-1 text-sm">${obs.filesModified.join(', ')}</p></div>` : ''}
            ${obs.gitCommit ? `<div><span class="text-sm font-medium text-gray-500">Git</span><p class="mt-1 text-sm">${obs.gitBranch} @ ${obs.gitCommit.slice(0, 8)}</p></div>` : ''}
          </div>
        `;
        document.getElementById('observation-modal').classList.remove('hidden');
      } catch (e) {
        console.error('Failed to load observation:', e);
      }
    }

    function closeObservation() {
      document.getElementById('observation-modal').classList.add('hidden');
    }

    async function search() {
      const query = document.getElementById('search-input').value;
      if (!query) return loadObservations();
      const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
      const observations = await res.json();
      renderObservations(observations);
    }

    function openSearch() {
      document.getElementById('search-modal').classList.remove('hidden');
      document.getElementById('modal-search').focus();
    }

    function closeSearch() {
      document.getElementById('search-modal').classList.add('hidden');
    }

    async function modalSearch() {
      const query = document.getElementById('modal-search').value;
      if (!query) return;
      const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
      const observations = await res.json();
      document.getElementById('search-results').innerHTML = observations.map(obs => {
        const icons = { bugfix: '🔴', feature: '🟢', decision: '🟣', discovery: '🔵', change: '🟡' };
        return `<div class="p-3 hover:bg-gray-50 rounded cursor-pointer" onclick="showObservation(${obs.id});closeSearch();">
          <span>${icons[obs.type] || '⚪'}</span>
          <span class="font-medium ml-2">${obs.title}</span>
        </div>`;
      }).join('');
    }

    function showTab(tab) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      if (tab === 'patterns') loadPatterns();
    }

    async function loadPatterns() {
      try {
        const res = await fetch('/api/patterns');
        const patterns = await res.json();
        document.getElementById('patterns-list').innerHTML = patterns.map(p => `
          <div class="bg-gray-50 rounded-lg p-4">
            <div class="flex justify-between items-start">
              <span class="font-medium">${p.pattern}</span>
              <span class="text-sm text-gray-500">${(p.confidence * 100).toFixed(0)}% confidence</span>
            </div>
            <p class="text-sm text-gray-600 mt-2">${p.occurrences} occurrences</p>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load patterns:', e);
      }
    }

    async function syncCloud() {
      alert('Cloud sync feature requires configuration in Settings');
    }

    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'observation.created') {
          loadObservations();
          loadStats();
        }
      };
    }

    function updateCharts(typeBreakdown) {
      const ctx = document.getElementById('typeChart');
      if (!ctx) return;

      const labels = Object.keys(typeBreakdown);
      const data = Object.values(typeBreakdown);
      const colors = ['#ef4444', '#22c55e', '#a855f7', '#3b82f6', '#eab308', '#f97316'];

      if (typeChart) typeChart.destroy();
      typeChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: colors }]
        },
        options: { responsive: true }
      });
    }

    init();
  </script>
</body>
</html>
